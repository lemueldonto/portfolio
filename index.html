<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04123a" />
    <script>
      // Apply the stored theme before first paint (no flash).
      (function () {
        try {
          var t = localStorage.getItem('portfolio.theme')
          document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark'
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>

    <title>Lemuel Donto — Lead Software Engineer · Distributed Systems</title>
    <meta
      name="description"
      content="Komlan Lemuel Donto — Lead Software Engineer building real-time distributed microservices in Go, Java & Spring Boot on AWS. Open to remote worldwide."
    />
    <meta name="author" content="Komlan Lemuel Donto" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lemuel Donto — Lead Software Engineer · Distributed Systems" />
    <meta
      property="og:description"
      content="I build distributed systems that move 350,000 parcels a day. Backend · Cloud · Real-time. Open to remote worldwide."
    />
    <meta property="og:url" content="https://lemueldonto.com" />
    <meta property="og:image" content="https://lemueldonto.com/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lemuel Donto — Lead Software Engineer" />
    <meta
      name="twitter:description"
      content="I build distributed systems that move 350,000 parcels a day."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

</html>
